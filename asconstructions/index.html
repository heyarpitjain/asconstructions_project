<!doctype html>
<html lang="en">
  <head>
    <!-- 🔥 BASIC -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔥 TITLE -->
    <title>AS Constructions | Water & Infrastructure Experts</title>

    <!-- 🔥 META SEO -->
    <meta
      name="description"
      content="AS Constructions is a leading civil contractor specializing in water supply, sewerage, and infrastructure projects across India."
    />
    <meta
      name="keywords"
      content="AS Constructions, civil contractor, water treatment plant, sewerage, infrastructure India"
    />
    <meta name="author" content="AS Constructions" />

    <!-- 🔥 FAVICON -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- 🔥 OPEN GRAPH (FOR WHATSAPP / LINK PREVIEW) -->
    <meta property="og:title" content="AS Constructions" />
    <meta
      property="og:description"
      content="Building reliable infrastructure for a sustainable future."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.asconstructions.in" />
    <meta property="og:image" content="/preview.jpg" />

    <!-- 🔥 TWITTER (OPTIONAL BUT GOOD) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AS Constructions" />
    <meta
      name="twitter:description"
      content="Water supply & infrastructure experts."
    />
    <meta name="twitter:image" content="/preview.jpg" />

    <!-- 🔥 PERFORMANCE -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- 🔥 THEME COLOR (MOBILE BROWSER UI COLOR) -->
    <meta name="theme-color" content="#000000" />

    <!-- 🔥 STRUCTURED DATA (SEO BOOST) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "AS Constructions",
        "url": "https://www.asconstructions.in",
        "logo": "https://www.asconstructions.in/logo.png",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+919981149411",
          "contactType": "customer service",
          "areaServed": "IN"
        }
      }
    </script>
  </head>

  <body>
    <!-- 🔥 ROOT -->
    <div id="root"></div>

    <!-- 🔥 MAIN SCRIPT -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
